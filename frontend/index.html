<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AI Smart Mylapore - Advanced Traffic Prediction, Routing and Parking Management system.">
    <title>AI Smart Mylapore - 3D Urban Routing & Predictor Platform</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@500;600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- CDN scripts for React, Three.js, GSAP, and Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS with custom styling configuration -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'dark-obsidian': '#050816',
                        'dark-navy': '#09111F',
                        'glass-bg': 'rgba(13, 20, 38, 0.65)',
                        'electric-cyan': '#00E5FF',
                        'royal-blue': '#3B82F6',
                        'deep-purple': '#6D5DFB',
                        'neon-green': '#22C55E',
                        'neon-orange': '#FFB000',
                        'border-glass': 'rgba(255, 255, 255, 0.08)'
                    },
                    fontFamily: {
                        'sans': ['Inter', 'Poppins', 'sans-serif'],
                        'display': ['Outfit', 'Poppins', 'sans-serif']
                    },
                    boxShadow: {
                        'neon-cyan': '0 0 25px rgba(0, 229, 255, 0.35)',
                        'neon-purple': '0 0 25px rgba(109, 93, 251, 0.35)',
                        'neon-green': '0 0 25px rgba(34, 197, 94, 0.35)',
                        'glass': '0 8px 32px 0 rgba(0, 0, 0, 0.37)'
                    }
                }
            }
        }
    </script>
    
    <!-- Stylesheet with glassmorphism classes -->
    <link rel="stylesheet" href="/static/src/index.css">
</head>
<body class="bg-dark-obsidian text-gray-100 overflow-x-hidden">
    <div id="root"></div>
    
    <!-- Render the main React app using Babel transpilation on-the-fly -->
    <script type="text/babel" charset="UTF-8" src="/static/src/App.jsx"></script>
</body>
</html>
